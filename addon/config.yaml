name: "Intervals.icu MCP Server"
description: "MCP server exposing Intervals.icu training data to AI assistants like Claude, with webhook receiver and automated coaching via Claude API."
version: "2.5.28"
slug: "intervals_mcp"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "MCP + Webhook + Coach endpoints"
watchdog: "http://[HOST]:[PORT:8765]/health"
options:
  athlete_id: ""
  api_key: ""
  port: 8765
  webhook_secret: ""
  anthropic_api_key: ""
  coach_secret: ""
  claude_model: "claude-sonnet-4-6"
  ha_mobile_service: ""
  token_expiry_days: 180
  read_only: false
schema:
  athlete_id: str
  api_key: password
  port: int
  webhook_secret: password?
  anthropic_api_key: password
  coach_secret: password
  claude_model: "list(claude-sonnet-4-6|claude-opus-4-7|claude-opus-4-6|claude-haiku-4-5)?"
  ha_mobile_service: str?
  token_expiry_days: int?
  read_only: bool?
map:
  - config:rw
hassio_api: true
hassio_role: default
homeassistant_api: true
