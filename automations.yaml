# intervals_icu_automations.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Add via: Settings → Automations → ⋮ → Edit as YAML
#
# Requires:
#   - Intervals.icu MCP addon running (port 8765)
#   - Mobile app companion installed on your phone
#   - Webhook configured in intervals.icu → Settings → Developer Settings
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. Instant notification when a workout uploads ───────────────────────────

- id: intervals_workout_uploaded_notify
  alias: "🏃 Intervals.icu — Workout uploaded"
  description: "Notify immediately when a workout syncs from Garmin"
  trigger:
    - platform: event
      event_type: intervals_icu_activity_uploaded
  action:
    - service: notify.mobile_app  # ← replace with your device: notify.mobile_app_YOUR_PHONE
      data:
        title: "🏃 Workout synced!"
        # Values are cast to safe types to prevent template injection
        message: >
          {{ trigger.event.data.type | string | truncate(30, true, '') }}
          · {{ trigger.event.data.name | string | truncate(50, true, '') }}
          · {{ trigger.event.data.duration_min | float(0) | round(1) }} min
          · {{ trigger.event.data.distance_km | float(0) | round(2) }} km
          · TSS {{ trigger.event.data.tss | float(0) | round(0) }}
        data:
          tag: intervals_upload
          group: training
          color: "#3498db"
          url: "https://intervals.icu"
          actions:
            - action: URI
              title: "Open intervals.icu"
              uri: "https://intervals.icu"

# ── 2. Log analysis event and update fitness helpers ─────────────────────────

- id: intervals_activity_analyzed_log
  alias: "📊 Intervals.icu — Activity analyzed"
  description: "Log analysis event and update CTL/ATL/TSB helpers for dashboard"
  trigger:
    - platform: event
      event_type: intervals_icu_activity_analyzed
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.training_ctl
      data:
        value: "{{ trigger.event.data.ctl | float(0) | round(1) }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.training_atl
      data:
        value: "{{ trigger.event.data.atl | float(0) | round(1) }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.training_tsb
      data:
        value: "{{ trigger.event.data.tsb | float(0) | round(1) }}"

# ── 3. Plan updated notification ─────────────────────────────────────────────

- id: intervals_calendar_updated_notify
  alias: "📅 Intervals.icu — Training plan updated"
  description: "Notify when Claude adjusts the upcoming training plan"
  trigger:
    - platform: event
      event_type: intervals_icu_calendar_updated
  action:
    - service: notify.mobile_app  # ← replace with your device
      data:
        title: "📅 Training plan updated"
        # workout names cast to string and truncated to prevent template injection
        message: >
          {{ trigger.event.data.count | int(0) }} session(s) adjusted.
          {% for w in trigger.event.data.workouts[:2] %}
          · {{ w.date | string | truncate(10, true, '') }}: {{ w.name | string | truncate(40, true, '') }}
          {% endfor %}
        data:
          tag: intervals_calendar
          group: training
          color: "#9b59b6"
          url: "https://intervals.icu"

# ── 4. Manual coaching trigger ────────────────────────────────────────────────

- id: intervals_manual_coach_trigger
  alias: "🤖 Intervals.icu — Manual coaching review"
  description: "Manually trigger a Claude coaching review from the dashboard"
  trigger:
    - platform: event
      event_type: intervals_icu_request_coaching
  action:
    - service: rest_command.intervals_coach_review
      data:
        activity_id: "{{ trigger.event.data.activity_id | default('') | string | truncate(20, true, '') }}"

# ── 5. Morning training reminder ──────────────────────────────────────────────

- id: intervals_morning_training_reminder
  alias: "☀️ Intervals.icu — Morning training reminder"
  description: "Morning coaching check — reviews upcoming plan"
  trigger:
    - platform: time
      at: "07:30:00"
  condition:
    - condition: state
      entity_id: input_boolean.training_reminders_enabled
      state: "on"
  action:
    - service: rest_command.intervals_coach_review
      data:
        activity_id: ""

